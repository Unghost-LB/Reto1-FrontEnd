<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Rincón del Café</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar">
        <div class="brand">
            <img src="pictures/logo_el rincon del cafe.png" alt="Logo Cyber" class="logo-img">
            <span class="brand-name">El Rincón del Café</span>
        </div>
    </nav>
  </header>

  <main>
    <section>
        <div class="container">
            <h1>Nuestro Menú</h1>
            <p class="subtitle">Café, libros y algo rico para acompañar</p>
            <div class="grid">
                <article class="card">
                    <img src="pictures/capucchino.jpg" alt="Cappuccino" class="Cappuccino">
                    <div class="card-body">
                        <div class="row">
                            <span class="dish-name">Cappuccino Clásico</span>
                            <span class="price">S/7</span>
                        </div>
                    <p>Espresso dulce con leche vaporizada y espuma cremosa</p>  
                </div>
                </article>


                <article class="card">
                    <img src="pictures/crosoisant.jpg" alt="Crosoisant" class="Crosoisant">
                    <div class="card-body">
                        <div class="row">
                            <span class="dish-name">Crosoisant</span>
                            <span class="price">S/5</span>
                        </div>
                    <p>Recién horneado, crocante por fuera y suave por dentro</p>  
                </div>
                </article>


                <article class="card">
                    <img src="pictures/chessecake.jpg" alt="Cheesecake">
                    <div class="card-body">
                        <div class="row">
                            <span class="dish-name">Cheesecake de Fresa</span>
                            <span class="price">S/7</span>
                        </div>
                    <p>Cremoso y frío, con cobertura de fresas frescas</p>  
                </div>
                </article>
            </div>
        </div>
    </section>
  </main>

</body>
</html>
